third_party_dir = "third-party"

[buck]
file_name = "BUCK"
rust_library = "cargo.rust_library"
rust_binary = "cargo.rust_binary"
buildscript_genrule = "buildscript_run"
buckfile_imports = """
load("@prelude//rust:cargo_buildscript.bzl", "buildscript_run")
load("@prelude//rust:cargo_package.bzl", "cargo")
"""
generated_file_header = """
##
## \u0040generated by reindeer
## Do not edit by hand.
##
## See README.md for directions on how to update this.
##
"""

[platform.riscv64]
target_arch = ["riscv64"]
target_feature = ["+m","+a","+f","+d","+c"]
target_os = ["none"]
target_pointer_width = ["64"]
target_has_atomic = ["8", "16", "32", "64"]
execution-platform = false
features = ["no_std"]

[platform.macos-arm64]
target = "aarch64-apple-darwin"
execution-platform = true
features = ["default"]

[platform.macos-x86_64]
target = "x86_64-apple-darwin"
execution-platform = true

[platform.linux-arm64]
target = "aarch64-unknown-linux-gnu"
execution-platform = true

[platform.linux-x86_64]
target = "x86_64-unknown-linux-gnu"
execution-platform = true

[platform.windows-arm64]
target = "aarch64-pc-windows-msvc"
execution-platform = true

[platform.windows-x86_64]
target = "x86_64-pc-windows-msvc"
execution-platform = true
