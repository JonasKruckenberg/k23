name: Publish Manual

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push a branch
      pages: write # To push to a GitHub Pages site
      id-token: write # To update the deployment status
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Book
        # //manual:manual is the source of truth — the genrule includes the
        # auto-generated kcfg reference (//build:config_docs) that a plain
        # `mdbook build` would miss.
        id: book
        run: |
          OUT=$(nix develop --command buck2 build --show-output //manual:manual | awk '{print $2}')
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.book.outputs.path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
