name: changed-targets

# Reusable workflow that computes the set of Buck2 targets impacted by a PR and
# exposes them to downstream jobs as two outputs:
#   - `impacted`: space-separated target list. EMPTY means "run the full suite"
#                 (an empty `targets` arg is the whole workspace in the justfile)
#   - `skip`:     "true" only when nothing is impacted, so a downstream job knows
#                 an empty `impacted` means "run nothing" rather than "run all".
#
# Intended to be invoked on `pull_request` events only.

on:
  workflow_call:
    outputs:
      impacted:
        description: "space-separated impacted targets; empty = run the full suite"
        value: ${{ jobs.changed-targets.outputs.impacted }}
      skip:
        description: "true when no targets are impacted (downstream jobs must not run)"
        value: ${{ jobs.changed-targets.outputs.skip }}

permissions:
  contents: read

jobs:
  changed-targets:
    name: Determine changed targets
    runs-on: ubuntu-latest
    outputs:
      impacted: ${{ steps.compute.outputs.impacted }}
      skip: ${{ steps.compute.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D

      - name: Colocate jj on git
        run: nix develop .#ci --command jj git init --colocate

      - name: Determine base SHA
        id: base
        run: |
          BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"
          echo "Base: $BASE"

      - name: Restore base.jsonl
        id: cache-base
        uses: actions/cache@v6
        with:
          path: base.jsonl
          key: changed-targets-base-${{ runner.os }}-${{ steps.base.outputs.sha }}

      - name: Build base.jsonl (cache miss)
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          REPO=$PWD
          git worktree add --detach /tmp/base-tree "${{ steps.base.outputs.sha }}"
          if [ ! -f /tmp/base-tree/.buckconfig ]; then
            echo "Base ${{ steps.base.outputs.sha }} predates buck2 setup — no base.jsonl will be produced"
          else
            (cd /tmp/base-tree && nix develop "$REPO#ci" --command supertd targets root//... --output "$REPO/base.jsonl") \
              || { echo "::warning::supertd targets failed at base — base.jsonl skipped"; rm -f base.jsonl; }
          fi
          git worktree remove --force /tmp/base-tree

      - name: Compute impacted targets
        id: compute
        # Run the `just changed-targets-diff` command to establish the diff, then runs `just changed-targets`
        # to produce the list of impacted buck2 targets from that.
        #
        # Emits the two outputs (`impacted` and `skip`) at the end depending on outcome.
        run: |
          full_run() { echo "impacted=" >> "$GITHUB_OUTPUT"; echo "skip=false" >> "$GITHUB_OUTPUT"; }
          if [ ! -s base.jsonl ]; then
            echo "No base.jsonl available — falling back to full suite"
            full_run; exit 0
          fi
          nix develop .#ci --command just changed-targets-diff "${{ steps.base.outputs.sha }}" > changes.txt
          set +e
          IMPACTED=$(nix develop .#ci --command just changed-targets changes.txt base.jsonl)
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::changed-targets failed (exit $rc) — falling back to full suite"
            full_run; exit 0
          fi
          IMPACTED=$(printf '%s' "$IMPACTED" | tr -s '[:space:]' ' ' | sed 's/^ *//;s/ *$//')
          if [ "$IMPACTED" = "__ALL__" ]; then
            echo "Pessimistic fallback: a high-level file changed — full suite"
            full_run
          elif [ -z "$IMPACTED" ]; then
            echo "No impacted targets — downstream jobs skip"
            echo "impacted=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Impacted: $IMPACTED"
            echo "impacted=$IMPACTED" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
