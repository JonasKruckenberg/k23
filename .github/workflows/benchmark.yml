name: Benchmarks

# Triggers:
#   push: main          → run the full benchmark suite (continuous baseline).
#   pull_request        → only when the `bench` label is set, runs benchmarks only for targets changed by the PR.
#   workflow_dispatch   → manual full run.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  # Cancel in-flight runs on PRs (latest push wins). On main we want every
  # commit's data point preserved, so do not cancel.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changed-targets:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'bench')
    uses: ./.github/workflows/_changed-targets.yml

  benchmarks:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    # only run benchmarks if EITHER: we pushed to main OR the PR is tagged with the `bench` label.
    #
    # PRs will only run affected benchmarks by default, pushes to main or manual dispatches run everything
    if: |
      always() && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'bench')
          && needs.changed-targets.result == 'success')
      )
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh benchmark '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'
