name: Claude Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      ((github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude /review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude /review')))
      && (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    env:
      PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: refs/pull/${{ github.event.issue.number || github.event.pull_request.number }}/head

      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D

      - name: Export nix devshell env to subprocesses
        run: |
          nix print-dev-env .#ci > "$RUNNER_TEMP/devshell.env.sh"
          echo "BASH_ENV=$RUNNER_TEMP/devshell.env.sh" >> "$GITHUB_ENV"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude /review"
          show_full_output: true

          settings: .github/claude-review-settings.json
          prompt: |
            DO NOT run `just preflight` as suggested by the review skill, instead query
            the CI status checks via `gh api`. Both run the equivalent checks by the CI checks are more performant.

            After running /review per .claude/skills/review/SKILL.md, publish the review
            as ONE GitHub PR review with line-anchored, resolvable inline comments via
            `gh api`. Do NOT post the review as an issue comment or PR comment.

            The PR number is in the `PR_NUMBER` env var, and the repo slug
            (`owner/repo`) is in the runner-provided `GITHUB_REPOSITORY` env var.
            Use `$PR_NUMBER` and `$GITHUB_REPOSITORY` directly in every `gh` command
            below — always pass the PR number explicitly to `gh`, never rely on
            `gh` inferring it from the current branch. The only blessed way to
            verify `PR_NUMBER` is `printenv PR_NUMBER` (allow-listed); do not
            attempt other forms of expansion or echo — they are denied and waste
            turns. `GITHUB_REPOSITORY` is set by the Actions runner and does not
            need verification.

            1. PR context:
                 gh pr view "$PR_NUMBER" --json number,headRefOid,baseRefName,url
               headRefOid is the review's `commit_id`.

            2. Diff anchoring (inline comments on lines outside the diff are rejected
               with HTTP 422):
                 gh pr diff "$PR_NUMBER"
               Parse the unified diff to learn which (path, line, side) tuples are
               commentable. RIGHT = added/context lines on the new file; LEFT =
               removed/context lines on the old file.

            3. Map each finding with a concrete file:line into one comment object:
                 single line  -> {path, line, side:"RIGHT", body}
                 range a-b    -> {path, start_line:a, line:b, start_side:"RIGHT", side:"RIGHT", body}
                 deleted line -> side:"LEFT" (and start_side:"LEFT" for a range)
               The comment `body` begins with a severity tag (**Blocker** / **Major** /
               **Minor** / **Nit**), then the rule, concrete trigger, citation, and fix
               per SKILL.md. Keep [Fix this →] deeplinks if generated.

               Use markdown formatting to structure the review comments, make them easier to read
               (paths and code snippets in inline-code, use bold/italic where appropriate, etc)

            4. Findings whose line is NOT in the diff: do not drop them. Fold each into
               the review body under `## Out-of-diff findings`, prefixed with `**<path>**`.

            5. Review body holds only what doesn't anchor to a line — verdict
               out-of-diff findings, Notes:
                 **Verdict**: <Ready | Needs Attention | Needs Work>

                 (optional) ## **Out-of-diff findings**:
                 (optional) ## **Notes**:

              Use markdown formatting to structure the review comments, make them easier to read
              (paths and code snippets in inline-code, use bold/italic where appropriate, etc)

            6. Map verdict -> event:
                 Ready           -> APPROVE
                 Needs Attention -> COMMENT
                 Needs Work      -> REQUEST_CHANGES
               If unsure, prefer COMMENT (does not block automerge).

            7. Build the payload from FILES, not shell-quoted strings. Bash
               double-quoted strings keep `\n` as a literal two-character
               sequence; jq's `--arg` then JSON-escapes that to `\\n`, which
               renders as backslash-n on GitHub instead of a line break. Write
               the body and the comments array to disk first, then assemble
               with `--rawfile` / `--slurpfile`:

                 cat > /tmp/review-body.md <<'EOF'
                 **Verdict**: Needs Attention
                 ... actual body content with real newlines ...
                 EOF
                 printf '%s' "$COMMENTS_JSON" > /tmp/comments.json
                 jq -n --arg sha "$SHA" \
                       --rawfile body /tmp/review-body.md \
                       --slurpfile comments /tmp/comments.json \
                       '{commit_id:$sha, body:$body, comments:$comments[0]}' \
                   > /tmp/review.json

               Use a quoted heredoc (`<<'EOF'`) so backticks and `$` in the
               body are not expanded.

            8. Create the review as PENDING first (omit `event`), then verify
               the rendered body before submitting. A pending review is
               visible only to the bot, so this leaves no public artifact:

                 REVIEW_ID=$(gh api -X POST \
                   "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
                   --input /tmp/review.json --jq '.id')

               Read it back and confirm the body contains real line breaks:

                 gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews/$REVIEW_ID" \
                        --jq '.body'

               If the output shows literal `\n` instead of line breaks, the
               body is broken. Delete the pending review and rebuild — do NOT
               submit:

                 gh api -X DELETE \
                   "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews/$REVIEW_ID"

               Never use a "test" or empty review as a debug probe. The PR is
               not a sandbox; pending reviews are.

            9. Submit the verified pending review:

                 gh api -X POST \
                   "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews/$REVIEW_ID/events" \
                   -f event="$EVENT"

            10. On 422 "line must be part of the diff" when creating the
                pending review: delete it (step 8), move the offending comment
                into `## Out-of-diff findings` in the body, rebuild the
                payload from step 7. Do not retry the same payload.

            11. Print the submitted review URL. Do NOT also post an issue
                comment — that produces duplicate notifications.

            Re-running /review creates a second review; prior submitted
            reviews remain visible. Do not delete or amend prior *submitted*
            reviews; the PR history is the audit trail. Pending reviews (the
            kind from step 8) are scratch and may be freely deleted before
            submission.
