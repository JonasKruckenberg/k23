name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - run: nix develop .#ci --command just check-fmt
      - run: nix develop .#ci --command just buck2-audit
      - run: nix develop .#ci --command just reindeer-clean
      - run: nix develop .#ci --command just check-license-headers

  # Computes the set of Buck2 targets impacted by a PR. Skipped on push to main
  # (no useful base ref). See .github/workflows/_changed-targets.yml for details.
  changed-targets:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_changed-targets.yml

  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: riscv64
            platform: "//platforms:riscv64"
          - name: aarch64
            platform: "//platforms:aarch64"
          - name: x86_64
            platform: "//platforms:x86_64"
    name: check (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: ${{ !cancelled() && needs.changed-targets.result != 'failure' && needs.changed-targets.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just platform=${{ matrix.platform }} check '${{ needs.changed-targets.outputs.impacted }}'

  clippy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: riscv64
            platform: "//platforms:riscv64"
          - name: aarch64
            platform: "//platforms:aarch64"
          - name: x86_64
            platform: "//platforms:x86_64"
    name: clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: ${{ !cancelled() && needs.changed-targets.result != 'failure' && needs.changed-targets.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just platform=${{ matrix.platform }} clippy '${{ needs.changed-targets.outputs.impacted }}'

  unittests:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: ${{ !cancelled() && needs.changed-targets.result != 'failure' && needs.changed-targets.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just unittests '${{ needs.changed-targets.outputs.impacted }}'

  miri:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: ${{ !cancelled() && needs.changed-targets.result != 'failure' && needs.changed-targets.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just miri '${{ needs.changed-targets.outputs.impacted }}'

  loom:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: ${{ !cancelled() && needs.changed-targets.result != 'failure' && needs.changed-targets.outputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just loom '${{ needs.changed-targets.outputs.impacted }}'

  # TODO rework this once we have more on-target tests types
  selftests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: riscv64
    name: selftests (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [changed-targets]
    # selftest filtering:
    # - IF `changed-targets` failed, was cancelled, or produced `skip = true` => skip
    # - IF `changed-targets` determined a full run OR the impacted list contains the //sys:k23-qemu-riscv64-tests target
    #     => run
    #
    # we hardcode this here for now to avoid complicating the justfile
    if: >-
      ${{ !cancelled()
          && needs.changed-targets.result != 'failure'
          && needs.changed-targets.outputs.skip != 'true'
          && (needs.changed-targets.outputs.impacted == ''
              || contains(needs.changed-targets.outputs.impacted, 'root//sys:k23-qemu-riscv64-tests')) }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: buck-out
          key: buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: |
            buck2-${{ runner.os }}-${{ github.job }}-${{ matrix.name }}-
            buck2-${{ runner.os }}-${{ github.job }}-
            buck2-${{ runner.os }}-
      - run: nix develop .#ci --command just selftests

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/advisory-db
          key: cargo-deny-${{ runner.os }}-${{ hashFiles('third-party/Cargo.lock') }}
          restore-keys: |
            cargo-deny-${{ runner.os }}-
      - run: nix develop .#ci --command just cargo-deny
