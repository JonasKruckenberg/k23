name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command just check-fmt

  buck2-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command buck2 audit cell
      - run: nix develop . --command buck2 audit visibility //sys:k23-riscv64 //sys:k23-qemu-riscv64 //sys/kernel:kernel //sys/loader:loader
      - run: nix develop . --command buck2 audit providers //sys:k23-riscv64 //sys:k23-qemu-riscv64 //sys/kernel:kernel //sys/loader:loader

  # Computes the set of Buck2 targets impacted by a PR. Skipped on push to main
  # (no useful base ref). Outputs go via an `impacted-targets` artifact which
  # downstream jobs consume; the `mode` job-output is a sentinel:
  #   - "filter": run only the targets listed in impacted-targets.txt
  #   - "all":    pessimistic fallback (a high-level file changed); run full suite
  #   - "noop":   no impacted targets; downstream jobs short-circuit to success
  btd:
    name: Determine affected targets
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.compute.outputs.mode }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Colocate jj on git
        run: nix develop . --command jj git init --colocate

      - name: Determine base SHA
        id: base
        run: |
          BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"
          echo "Base: $BASE"

      - name: Restore base.jsonl
        id: cache-base
        uses: actions/cache@v4
        with:
          path: base.jsonl
          key: btd-base-${{ runner.os }}-${{ steps.base.outputs.sha }}

      - name: Build base.jsonl (cache miss)
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          REPO=$PWD
          git worktree add --detach /tmp/base-tree "${{ steps.base.outputs.sha }}"
          if [ ! -f /tmp/base-tree/.buckconfig ]; then
            echo "Base ${{ steps.base.outputs.sha }} predates buck2 setup — no base.jsonl will be produced"
          else
            (cd /tmp/base-tree && nix develop "$REPO" --command supertd targets root//... --output "$REPO/base.jsonl") \
              || { echo "::warning::supertd targets failed at base — base.jsonl skipped"; rm -f base.jsonl; }
          fi
          git worktree remove --force /tmp/base-tree

      - name: Compute impacted targets
        id: compute
        run: |
          if [ ! -s base.jsonl ]; then
            echo "No base.jsonl available — falling back to full suite"
            echo "mode=all" >> "$GITHUB_OUTPUT"
            : > impacted-targets.txt
            exit 0
          fi
          nix develop . --command just btd-changes "${{ steps.base.outputs.sha }}" > changes.txt
          set +e
          IMPACTED=$(nix develop . --command just btd-impacted changes.txt base.jsonl)
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::btd-impacted failed (exit $rc) — falling back to full suite"
            echo "mode=all" >> "$GITHUB_OUTPUT"
            : > impacted-targets.txt
            exit 0
          fi
          IMPACTED=$(printf '%s' "$IMPACTED" | tr -s '[:space:]' ' ' | sed 's/^ *//;s/ *$//')
          if [ "$IMPACTED" = "__ALL__" ]; then
            echo "Pessimistic fallback: a high-level file changed — full suite"
            echo "mode=all" >> "$GITHUB_OUTPUT"
            : > impacted-targets.txt
          elif [ -z "$IMPACTED" ]; then
            echo "No impacted targets"
            echo "mode=noop" >> "$GITHUB_OUTPUT"
            : > impacted-targets.txt
          else
            echo "Impacted: $IMPACTED"
            echo "mode=filter" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$IMPACTED" > impacted-targets.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: btd-impacted
          path: impacted-targets.txt
          if-no-files-found: error

  check:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh check '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'

  clippy:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh clippy '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'

  unittests:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh unittests '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'

  miri:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh miri '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'

  loom:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh loom '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'

  benchmarks:
    runs-on: ubuntu-latest
    needs: [btd]
    if: always() && (needs.btd.result == 'success' || needs.btd.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - if: needs.btd.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: btd-impacted
      - run: ./.github/workflows/run-filtered.sh benchmark '${{ needs.btd.result }}' '${{ needs.btd.outputs.mode }}'
