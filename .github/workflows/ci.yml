name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command just check-fmt

  buck2-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command just buck2-audit

  # Computes the set of Buck2 targets impacted by a PR. Skipped on push to main
  # (no useful base ref). See .github/workflows/_changed-targets.yml for details.
  changed-targets:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/_changed-targets.yml

  check:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh check '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  clippy:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh clippy '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  unittests:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh unittests '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  miri:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh miri '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  loom:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh loom '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  selftests:
    runs-on: ubuntu-latest
    needs: [changed-targets]
    if: always() && (needs.changed-targets.result == 'success' || needs.changed-targets.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fetch impacted targets
        if: needs.changed-targets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: impacted-targets
      - run: ./.github/workflows/run-filtered.sh selftests '${{ needs.changed-targets.result }}' '${{ needs.changed-targets.outputs.mode }}'

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command just cargo-deny

  # Re-run reindeer and fail if third-party/BUCK (or any other reindeer-managed
  # file) is out of sync with third-party/Cargo.toml. Forces contributors to
  # commit the regenerated BUCK alongside any dep change.
  reindeer-clean:
    name: reindeer-clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop . --command just reindeer-clean
