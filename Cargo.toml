[workspace]
members = ["build/*", "kernel", "libs/dtb-parser", "libs/dtb-parser", "libs/sbicall", "libs/uart-16550", "libs/vmm", "loader"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Jonas Kruckenberg <iterpre@protonmail.com>"]

[workspace.dependencies]
dtb-parser = { path = "libs/dtb-parser" }
uart-16550 = { path = "libs/uart-16550" }
#gimli = { path = "_old/crates/gimli", features = ["read-core"] }
#fxhash = { path = "_old/crates/fxhash" }
sbicall = { path = "libs/sbicall" }
#vmm = { path = "_old/crates/vmm" }
#wasmparser = { path = "_old/crates/wasmparser" }
#cranelift-wasm = { path = "_old/crates/cranelift-wasm" }
#cranelift-bforest = { path = "_old/crates/cranelift-bforest" }
#cranelift-codegen = { path = "_old/crates/cranelift-codegen" }
#cranelift-entity = { path = "_old/crates/cranelift-entity" }
#cranelift-frontend = { path = "_old/crates/cranelift-frontend" }
#backtrace = { path = "_old/crates/backtrace" }
bitflags = "2.4.1"
log = "0.4.20"
riscv = "0.11.0"
cfg-if = "1.0.0"
hashbrown = { version = "0.14.3", features = ["nightly"] }
onlyerror = { version = "0.1.3", default-features = false }
target-lexicon = { version = "0.12.13", default-features = false }
bumpalo = "3.14.0"
regalloc2 = { version = "0.9.3", default-features = false }
spin = "0.9.8"
linked_list_allocator = "0.10.5"
smallvec = "2.0.0-alpha.4"
arrayvec = { version = "0.7.4", default-features = false }
qemu-exit = "3.0.2"

# build dependencies
cranelift-isle = { path = "build/cranelift-isle" }
serde = { version = "1.0.196", default-features = false, features = ["derive"] }
toml = "0.8.10"
anyhow = "1.0.79"
clap = { version = "4.5.0", features = ["derive"] }
env_logger = "0.11.2"
anstyle = "1.0.6"
cargo_metadata = "0.18.1"
ron = "0.8.1"
quote = "1.0.35"
proc-macro2 = "1.0.78"
object = { version = "0.32.2", default-features = false, features = ["elf", "write", "read"] }

[profile.release]
opt-level = 3
codegen-units = 1
lto = true
strip = true
overflow-checks = true
split-debuginfo = "packed"
